<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zerf Python API - Comparador de Subtítulos</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #f8c005;
            --secondary: #a70630;
            --bg: #0a0a0c;
            --card-bg: #151518;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 1rem 2rem;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-shrink: 0;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -1px;
            background: linear-gradient(90deg, var(--primary), #fff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-back {
            background: var(--glass);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 0.7rem 1.5rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.2s;
            display: inline-block;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
        }

        .layout {
            display: grid;
            grid-template-columns: 2fr 1.2fr 1.2fr 1.2fr;
            gap: 1rem;
            flex-grow: 1;
            height: 0;
        }

        /* Left Column (Video + Live Subs) */
        .left-col {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            height: 100%;
        }

        .video-wrapper {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            position: relative;
            padding-top: 56.25%;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .live-subs-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: stretch;
            padding: 1rem;
            text-align: left;
            position: relative;
            min-height: 150px;
            overflow-y: auto;
        }

        .live-text {
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1.4;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }

        /* Right Columns (Blocks Container) */
        #blocks-container {
            grid-column: span 3;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            overflow-y: auto;
            padding-right: 10px;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        .sub-block {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem;
            display: grid;
            gap: 1rem;
            transition: all 0.2s;
            position: relative;
        }

        .sub-block.active {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(248, 192, 5, 0.1);
        }

        .sub-block.different {
            border-color: var(--secondary);
            box-shadow: 0 0 10px rgba(167, 6, 48, 0.2);
            background: rgba(167, 6, 48, 0.1);
        }

        .block-time {
            color: var(--primary);
            font-size: 0.8rem;
            font-weight: 800;
        }

        .block-original {
            color: #aaa;
            font-size: 0.95rem;
        }

        .block-suggestion {
            color: #fff;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.03);
            padding: 0.8rem;
            border-radius: 5px;
            border: 1px dashed var(--border);
            display: none;
            width: 100%;
            height: 100%;
            min-height: 80px;
            outline: none;
            resize: vertical;
            overflow: auto;
        }

        .block-suggestion:focus {
            border-color: var(--primary);
        }

        .block-suggestion.visible {
            display: block;
        }

        .btn-action {
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: pointer;
            margin-top: 5px;
            display: none;
        }

        .btn-accept {
            background: #22c55e;
        }

        .btn-save-edit {
            background: var(--primary);
            color: #000;
            font-weight: bold;
        }

        .btn-action.visible {
            display: inline-block;
            margin-right: 5px;
        }

        .accepted-indicator {
            color: #22c55e;
            font-size: 0.8rem;
            font-weight: 600;
            display: none;
            margin-top: 8px;
            text-align: right;
            padding-right: 5px;
        }

        .accepted-indicator.visible {
            display: block;
        }
    </style>
</head>

<body>

    <header>
        <div>
            <h1>Previsualizador de Subtítulos V2</h1>
            <p id="video-title"
                style="opacity: 0.6; margin-top: 0.2rem; font-size: 1rem; display: flex; align-items: center; gap: 10px;">
                <span id="header-id">ID: Cargando...</span>
                <span>|</span>
                <span id="header-title">Cargando Título...</span>
            </p>
        </div>
        <div style="display: flex; gap: 1rem;">
            <div style="display: flex; gap: 1rem; align-items:center;">
                <span id="save-status" style="font-size: 0.8rem; opacity: 0.7; color: var(--primary);"></span>
                <button id="btn-refine" class="btn-back"
                    style="background: var(--secondary); border-color: rgba(255,255,255,0.2);">Refinar con
                    Gemini</button>
                <button id="btn-save" class="btn-back"
                    style="background: var(--primary); color: #000; opacity: 0.5; cursor: not-allowed;" disabled>Guardar
                    Definitivo</button>
                <a href="/" class="btn-back">Volver al Dashboard</a>
            </div>
        </div>
    </header>

    <div class="layout">
        <!-- MITAD IZQUIERDA: VÍDEO Y SUBS EN DIRECTO -->
        <div class="left-col">
            <div class="video-wrapper">
                <div id="player"></div>
            </div>
            <div class="live-subs-box">
                <div style="width: 100%; display: flex; flex-direction: column; gap: 1rem;">
                    <div
                        style="background: rgba(59, 130, 246, 0.1); border: 1px solid #3b82f6; border-radius: 8px; padding: 15px 10px 10px 10px; position: relative;">
                        <span
                            style="position: absolute; top: -10px; left: 10px; background: var(--card-bg); font-size: 0.7rem; color: #3b82f6; padding: 0 5px; font-weight: bold;">YouTube
                            VTT</span>
                        <div id="live-vtt" class="live-text">-</div>
                    </div>
                    <div
                        style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 15px 10px 10px 10px; position: relative;">
                        <span
                            style="position: absolute; top: -10px; left: 10px; background: var(--card-bg); font-size: 0.7rem; color: #aaa; padding: 0 5px; font-weight: bold;">Whisper
                            SRT</span>
                        <div id="live-whisper" class="live-text">-</div>
                    </div>
                    <div
                        style="background: rgba(248, 192, 5, 0.1); border: 1px solid var(--primary); border-radius: 8px; padding: 15px 10px 10px 10px; position: relative;">
                        <span id="live-gemini-title"
                            style="position: absolute; top: -10px; left: 10px; background: var(--card-bg); font-size: 0.7rem; color: var(--primary); padding: 0 5px; font-weight: bold;">Refinado
                            (Edición)</span>
                        <div id="live-gemini" class="live-text">Esperando reproducción...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- COLUMNAS DE BLOQUES -->
        <div id="blocks-container">
            <div style="color:var(--secondary); padding:2rem;">Cargando transcripciones desde la API...</div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const youtubeId = urlParams.get('v');

        if (!youtubeId) {
            alert("Error: Falta el parámetro ?v=ID_DEL_VIDEO en la URL.");
            window.location.href = "/";
        }

        let player;
        let srtData = [];
        let subBlockNodes = [];
        let syncInterval;
        let rawSrt = "";
        let rawVtt = "";
        let rawRefinadoSrt = "";
        let parsedRefinado = [];
        let initialRightSrt = "";
        let rightSrtSource = "none";

        // Load YouTube API asynchronously
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        // Fetch Video Metadata
        async function loadVideoData() {
            try {
                const res = await fetch(`/api/videos/${youtubeId}`);
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('header-id').innerText = `ID: ${data.id}`;
                    document.getElementById('header-title').innerText = data.title;
                }
            } catch (e) { console.error("Error cargando metadatos", e); }
        }

        // Fetch Subtitles
        async function loadSubtitles() {
            try {
                const res = await fetch(`/api/subtitles/all/${youtubeId}`);
                if (res.ok) {
                    const data = await res.json();
                    rawSrt = data.whisper_srt || "";
                    rawVtt = data.vtt || "";
                    rawRefinadoSrt = data.refinado_srt || "";
                    console.log("=== DEBUGGING API PAYLOAD ===");
                    console.log("Temp Refinado length:", data.temp_refinado_srt ? data.temp_refinado_srt.length : 0);
                    console.log("Final Refinado length:", data.refinado_srt ? data.refinado_srt.length : 0);
                    console.log("RawFinalRefinadoSrt stored:", rawRefinadoSrt.length);

                    if (data.temp_refinado_srt) {
                        initialRightSrt = data.temp_refinado_srt;
                        rightSrtSource = "temp_refinado_srt";
                    } else if (data.refinado_srt) {
                        // Fallback to finished srt if no temp
                        initialRightSrt = data.refinado_srt;
                        rightSrtSource = "refinado_srt";
                    }

                    if (!rawSrt) {
                        document.getElementById('blocks-container').innerHTML = '<div style="color:var(--secondary); padding:2rem;">No hay whisper_srt disponible para este vídeo en la Base de Datos.</div>';
                        return;
                    }

                    initViewer();
                } else {
                    document.getElementById('blocks-container').innerHTML = '<div style="color:var(--secondary); padding:2rem;">Error al cargar subtítulos (404).</div>';
                }
            } catch (e) {
                console.error(e);
                document.getElementById('blocks-container').innerHTML = '<div style="color:var(--secondary); padding:2rem;">Error de red al cargar subtítulos.</div>';
            }
        }

        function initViewer() {
            srtData = parseSRT(rawSrt);

            // Apply RightSrt payload once
            if (initialRightSrt) {
                let loadedDict = {};
                if (initialRightSrt.trim().startsWith('[')) {
                    // JSON Format (legacy)
                    try {
                        JSON.parse(initialRightSrt).forEach(b => {
                            loadedDict[b.index] = b.suggestion || b.originalText;
                        });
                    } catch (e) { }
                } else {
                    // SRT Format
                    parseSRT(initialRightSrt).forEach(b => {
                        loadedDict[b.index] = b.currentText;
                    });
                }

                srtData.forEach((block) => {
                    let rightText = loadedDict[block.index] !== undefined ? loadedDict[block.index] : null;

                    if (rightText !== null) {
                        block.suggestion = rightText;
                        block.currentText = rightText;
                        // Always mark as accepted if we have a right-side text to start with
                        block.accepted = true;
                    }
                });
            }

            renderBlocks();

            document.getElementById('live-gemini-title').innerText = (rightSrtSource === 'temp_refinado_srt') ? 'Borrador (temp_refinado_srt)' : (rightSrtSource === 'refinado_srt' ? 'Definitivo (refinado_srt)' : 'Borrador (Sin datos)');

            // Enable save button if we have loaded an existing edit
            if (rightSrtSource !== 'none') {
                const btnSave = document.getElementById('btn-save');
                btnSave.disabled = false;
                btnSave.style.opacity = '1';
                btnSave.style.cursor = 'pointer';
            }
        }

        function autoResizeTextarea(textarea) {
            textarea.style.height = 'auto';
            let newHeight = textarea.scrollHeight;
            if (newHeight < 80) newHeight = 80;
            textarea.style.height = newHeight + 'px';
        }

        function onYouTubeIframeAPIReady() {
            if (!youtubeId) return;
            player = new YT.Player('player', {
                videoId: youtubeId,
                playerVars: { 
                    'autoplay': 0, 
                    'controls': 1, 
                    'rel': 0,
                    'origin': window.location.origin
                },
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                syncInterval = setInterval(updateLiveSubtitles, 100);
            } else {
                clearInterval(syncInterval);
            }
        }

        function updateLiveSubtitles() {
            if (!player || !player.getCurrentTime) return;
            const currentTime = player.getCurrentTime();
            let found = false;

            for (let index = 0; index < subBlockNodes.length; index++) {
                const block = subBlockNodes[index];
                const data = srtData[index];
                if (currentTime >= data.start && currentTime <= data.end) {
                    if (!block.classList.contains('active')) {
                        block.classList.add('active');
                    }
                    if (!found) {
                        block.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        document.getElementById('live-vtt').innerText = data.overlapVtt ? data.overlapVtt : '-';
                        document.getElementById('live-whisper').innerText = data.originalText ? data.originalText : '-';
                        document.getElementById('live-gemini').innerText = data.currentText ? data.currentText : '-';
                        found = true;
                    }
                } else {
                    if (block.classList.contains('active')) {
                        block.classList.remove('active');
                    }
                }
            }
        }

        function timeToSeconds(timeStr) {
            if (!timeStr) return 0;
            const parts = timeStr.replace(',', '.').trim().split(':');
            let secs = 0;
            if (parts.length === 3) {
                secs = (parseFloat(parts[0]) * 3600) + (parseFloat(parts[1]) * 60) + parseFloat(parts[2]);
            } else if (parts.length === 2) {
                secs = (parseFloat(parts[0]) * 60) + parseFloat(parts[1]);
            }
            return secs;
        }

        function parseSRT(text) {
            if (!text) return [];
            
            // Fix API escaped newlines and BOM
            let cleanText = text.replace(/\\n/g, '\n').replace(/^\uFEFF/, '');
            // Normalize line breaks
            cleanText = cleanText.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            
            // Remove WEBVTT header and metadata robustly
            // This regex skips the line starting with WEBVTT and any subsequent lines until a blank line or a timestamp block
            cleanText = cleanText.replace(/^WEBVTT([^\n]*\n)*/i, '').trim();

            // Split by double newline to get blocks, but be flexible with whitespace
            const blocks = cleanText.split(/\n\s*\n/);

            let parsedBlocks = blocks.map((block, i) => {
                const lines = block.split('\n').map(l => l.trim()).filter(l => l !== "");
                if (lines.length < 1) return null;

                let timeLine = "";
                let textLines = [];

                // Find the line that contains the "-->" separator
                let timeLineIndex = lines.findIndex(l => l.includes('-->'));
                if (timeLineIndex === -1) return null;

                timeLine = lines[timeLineIndex];
                textLines = lines.slice(timeLineIndex + 1);

                const times = timeLine.split('-->');
                let blockText = textLines.join(' ');
                // Strip HTML/VTT tags like <c> or <00:00:11.680>
                blockText = blockText.replace(/<[^>]+>/g, '').trim();

                return {
                    index: i + 1,
                    start: times && times[0] ? timeToSeconds(times[0].trim()) : 0,
                    end: times && times[1] ? timeToSeconds(times[1].trim().split(/\s+/)[0]) : 0,
                    timeStr: timeLine,
                    originalText: blockText,
                    currentText: blockText,
                    suggestion: null,
                    accepted: false
                };
            }).filter(b => b !== null);

            // Filter Whisper hallucinations
            let j = parsedBlocks.length - 1;
            while (j >= 0) {
                let text = parsedBlocks[j].originalText.toLowerCase().replace(/[.,!?;:]/g, '').trim();
                let noSaludo = text.replace(/(un saludo\s*)+/g, '').trim();
                let isSoundTag = /^\[.*\]$/.test(text);

                if (text.length > 0 && noSaludo === '') {
                    parsedBlocks[j].originalText = "";
                    parsedBlocks[j].currentText = "";
                } else if (text !== "" && !isSoundTag) {
                    break;
                }
                j--;
            }

            return parsedBlocks;
        }

        function renderBlocks() {
            const container = document.getElementById('blocks-container');
            const rightTitle = (rightSrtSource === 'temp_refinado_srt') ? 'Borrador Guardado' :
                (rightSrtSource === 'refinado_srt' ? 'Definitivo' : 'Edición en Directo');

            const hasRefinement = rightSrtSource !== 'none';
            const showRefinadoCol = true; // Siempre mostrar para diseño de 5 columnas
            const gridCols = "85px 1fr 1fr 1.3fr 1fr";

            console.log("renderBlocks() called.");
            console.log("rawRefinadoSrt length inside renderBlocks:", rawRefinadoSrt.length);
            
            if (rawRefinadoSrt !== "") {
                parsedRefinado = parseSRT(rawRefinadoSrt);
                console.log("parsedRefinado length:", parsedRefinado.length);
                if (parsedRefinado.length > 0) {
                    console.log("First block of Refinado parsed:", parsedRefinado[0]);
                }
            } else {
                 console.log("rawRefinadoSrt is empty, parsing skipped");
            }

            container.innerHTML = `
                <div style="display: grid; grid-template-columns: ${gridCols}; gap: 1rem; padding: 0 1rem 0.5rem 1rem; color: var(--primary); font-weight: bold; font-size: 0.85rem; text-transform: uppercase; border-bottom: 1px solid var(--border); margin-bottom: 0.5rem; flex-shrink: 0;">
                    <div>Tiempo</div>
                    <div style="color: #3b82f6;">YouTube (VTT)</div>
                    <div style="color: #aaa;">Whisper (Original)</div>
                    <div style="color: var(--primary);">${rightTitle}</div>
                    ${showRefinadoCol ? '<div style="color: #22c55e;">SRT_REFINADO</div>' : ''}
                </div>
            `;

            const vttBlocks = parseSRT(rawVtt);
            let vttIndex = 0;
            let refIndex = 0;

            srtData.forEach((block, i) => {
                let overlapVtt = "";
                // Optimización O(N) para encontrar el solapamiento VTT (los bloques están ordenados por tiempo)
                while (vttIndex < vttBlocks.length && vttBlocks[vttIndex].end <= block.start) {
                    vttIndex++;
                }
                
                let tempVttIndex = vttIndex;
                let vttMatches = [];
                while (tempVttIndex < vttBlocks.length && vttBlocks[tempVttIndex].start < block.end) {
                    vttMatches.push(vttBlocks[tempVttIndex].originalText);
                    tempVttIndex++;
                }
                if (vttMatches.length > 0) {
                    overlapVtt = vttMatches.join(' ');
                }
                
                block.overlapVtt = overlapVtt;
                srtData[i].overlapVtt = overlapVtt;

                const div = document.createElement('div');
                div.className = 'sub-block';
                div.style.gridTemplateColumns = gridCols;

                let textToDisplay = block.suggestion !== null ? block.suggestion : block.originalText;
                let isDifferent = block.suggestion !== null ? (textToDisplay.trim() !== block.originalText.trim()) : false;

                if (isDifferent) {
                    div.classList.add('different');
                }

                // Si viene de Gemini, o no está aceptado, MOSTRAMOS el modo edición
                let needsAction = hasRefinement && (rightSrtSource === 'live_gemini' || !block.accepted);

                let suggestionHtml = "";
                if (hasRefinement) {
                    suggestionHtml = `
                        <textarea class="block-suggestion visible" id="sug-text-${i}" placeholder="Escribe aquí para editar a mano..." oninput="autoResizeTextarea(this); showSaveBtn(${i})">${textToDisplay}</textarea>
                        <div style="text-align: right;">
                            ${isDifferent ? `<button class="btn-action btn-accept ${needsAction ? 'visible' : ''}" id="btn-acc-${i}" onclick="acceptSuggestion(${i})">Aceptar Cambio</button>` : ''}
                            <button class="btn-action btn-save-edit" id="btn-save-edit-${i}" onclick="saveManualEdit(${i})">Guardar Bloque</button>
                        </div>
                        <div class="accepted-indicator ${!needsAction ? 'visible' : ''}" id="ind-acc-${i}">✓ Cambios Guardados</div>
                    `;
                } else {
                    suggestionHtml = `<div style="color: #666; font-size: 0.8rem; font-style: italic; padding: 1rem; text-align: center;">Refina con Gemini para activar la edición manual.</div>`;
                }

                // Resaltar en otro color visualmente si es diferente
                const blockBgColor = isDifferent && needsAction ? 'background-color: rgba(59, 130, 246, 0.05); border-left: 2px solid #3b82f6;' : '';

                let refinadoColHtml = "";
                if (showRefinadoCol) {
                    let refText = "-";
                    if (rawRefinadoSrt !== "") {
                        // Búsqueda directa por ID (Índice O(1) si están alineados o .find)
                        let foundRefBlock = null;
                        
                        // Optimización O(1) si los asumen sincronizados por índice:
                        if (parsedRefinado[i] && parsedRefinado[i].index === block.index) {
                            foundRefBlock = parsedRefinado[i];
                        } else {
                            // Fallback O(N) seguro por si el número de bloques mutó a pesar de todo
                            foundRefBlock = parsedRefinado.find(r => r.index === block.index);
                        }
                        
                        // Second fallback just in case: Exact Text Match
                        if (!foundRefBlock) {
                            foundRefBlock = parsedRefinado.find(r => r.originalText === block.originalText);
                        }

                        if (foundRefBlock) refText = foundRefBlock.currentText;
                    }
                    refinadoColHtml = `<div class="block-original" style="color: #22c55e; font-weight: 500;">${refText}</div>`;
                }

                div.innerHTML = `
                    <div class="block-time">${block.timeStr.split('-->')[0].trim()}</div>
                    <div class="block-original" style="opacity: 0.7; font-size: 0.85rem;">${overlapVtt || '-'}</div>
                    <div class="block-original" style="${blockBgColor}">${block.originalText}</div>
                    <div class="suggestion-area" id="sug-area-${i}" style="display: flex; flex-direction: column;">
                        ${suggestionHtml}
                    </div>
                    ${refinadoColHtml}
                `;
                container.appendChild(div);
                subBlockNodes.push(div);
            });
        }

        function showSaveBtn(index) {
            document.getElementById(`ind-acc-${index}`).classList.remove('visible');
            const acceptBtn = document.getElementById(`btn-acc-${index}`);
            if (acceptBtn) acceptBtn.classList.remove('visible');

            document.getElementById(`btn-save-edit-${index}`).classList.add('visible');
            srtData[index].accepted = false;
        }

        function acceptSuggestion(index) {
            const textarea = document.getElementById(`sug-text-${index}`);
            srtData[index].suggestion = textarea.value;
            srtData[index].currentText = textarea.value;
            srtData[index].accepted = true;

            document.getElementById(`ind-acc-${index}`).classList.add('visible');
            const acceptBtn = document.getElementById(`btn-acc-${index}`);
            if (acceptBtn) acceptBtn.classList.remove('visible');
            document.getElementById(`btn-save-edit-${index}`).classList.remove('visible');

            // Auto save the whole temp draft when blocks are accepted manually
            saveTempToBg();
        }

        function saveManualEdit(index) {
            acceptSuggestion(index);
        }

        async function saveTempToBg() {
            let tempSrt = "";
            srtData.forEach((block, i) => {
                const txtArea = document.getElementById(`sug-text-${i}`);
                let currentVal = block.originalText;

                if (txtArea && txtArea.classList.contains('visible') && txtArea.value.trim() !== "") {
                    currentVal = txtArea.value;
                } else if (block.suggestion) {
                    currentVal = block.suggestion;
                }

                tempSrt += `${i + 1}\n${block.timeStr}\n${currentVal}\n\n`;
            });

            document.getElementById('save-status').innerText = "Autoguardando...";

            const response = await fetch(`/api/save-temp/${youtubeId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ temp_srt: tempSrt })
            });

            const btnSave = document.getElementById('btn-save');
            btnSave.disabled = false;
            btnSave.style.opacity = '1';
            btnSave.style.cursor = 'pointer';

            if (response.ok) {
                document.getElementById('save-status').innerText = "Borrador temporal (DB)";
                setTimeout(() => { document.getElementById('save-status').innerText = ""; }, 2000);
            } else {
                document.getElementById('save-status').innerText = "Guardado fallido";
            }
        }

        // --- BUTTONS ---
        document.getElementById('btn-save').addEventListener('click', async () => {
            let finalSrt = "";
            srtData.forEach((block, i) => {
                const txtArea = document.getElementById(`sug-text-${i}`);
                let txt = block.originalText;
                
                // Prioridad: 1. Texto en el textarea 2. Sugerencia cargada 3. Original
                if (txtArea && txtArea.classList.contains('visible') && txtArea.value.trim() !== "") {
                    txt = txtArea.value;
                } else if (block.suggestion) {
                    txt = block.suggestion;
                }
                
                finalSrt += `${i + 1}\n${block.timeStr}\n${txt}\n\n`;
            });

            document.getElementById('save-status').innerText = "Guardando definitivo...";
            const response = await fetch(`/api/save-final/${youtubeId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ refined_srt: finalSrt })
            });

            const resData = await response.json();
            if (resData.success) {
                alert("¡Guardado en refinado_srt correctamente en la DB!");
                document.getElementById('save-status').innerText = "Mostrando Definitivo";
            } else {
                alert("Error base de datos: " + resData.error);
            }
        });

        document.getElementById('btn-refine').addEventListener('click', async () => {
            const btn = document.getElementById('btn-refine');
            btn.innerText = "Pensando...";
            btn.disabled = true;

            try {
                const response = await fetch(`/api/refine/${youtubeId}`);
                const data = await response.json();

                if (data.refined_raw) {
                    rightSrtSource = "live_gemini"; // Marcamos que tenemos datos

                    const parsedGemini = parseSRT(data.refined_raw);
                    console.log("Parsed Gemini blocks: ", parsedGemini.length);

                    if (parsedGemini.length === 0) {
                        alert("Gemini no ha devuelto un formato válido. Se mantiene el original.");
                    }

                    parsedGemini.forEach((b) => {
                        const targetBlock = srtData.find(s => s.index === b.index);
                        if (targetBlock) {
                            targetBlock.suggestion = b.originalText;
                            targetBlock.accepted = false; // Forzar estado de no-aceptado
                        }
                    });

                    renderBlocks();
                    setTimeout(() => { saveTempToBg(); }, 200);
                }
            } catch (e) {
                alert("Fallo al contactar con la API de Gemini. " + e);
            }

            btn.innerText = "Refinar con Gemini";
            btn.disabled = false;
        });

        // Initialize Call
        loadVideoData();
        loadSubtitles();

    </script>
</body>

</html>
