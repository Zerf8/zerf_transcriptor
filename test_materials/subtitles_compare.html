<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zerf - Comparador de Subtítulos</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- YouTube Iframe API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root {
            --primary: #f8c005;
            --secondary: #a70630;
            --bg: #0a0a0c;
            --card-bg: #151518;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 1rem 2rem;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* Evitar scroll en toda la pagina, usar paneles */
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-shrink: 0;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -1px;
            background: linear-gradient(90deg, var(--primary), #fff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-back {
            background: var(--glass);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 0.7rem 1.5rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
        }

        /* Layout Grid */
        .layout {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 1rem;
            flex-grow: 1;
            height: 0;
            /* Important for scrollable children */
        }

        /* Left Column (Video + Live Subs) */
        .left-col {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .video-wrapper {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            position: relative;
            padding-top: 56.25%;
            /* 16:9 Aspect Ratio */
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .live-subs-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: stretch;
            padding: 1rem;
            text-align: left;
            position: relative;
            min-height: 150px;
        }

        .live-text {
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1.4;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }

        /* Right Columns (VTT & SRT Texts) */
        .text-panel {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 0.8rem 1rem;
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 1px solid var(--border);
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge {
            font-size: 0.65rem;
            padding: 0.2rem 0.6rem;
            border-radius: 100px;
            background: var(--glass);
            border: 1px solid var(--border);
        }

        .badge-srt {
            color: #22c55e;
            border-color: #22c55e;
        }

        .badge-vtt {
            color: #3b82f6;
            border-color: #3b82f6;
        }

        .badge-gemini {
            color: #f8c005;
            border-color: #f8c005;
        }

        .text-content {
            flex-grow: 1;
            padding: 1rem;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.85rem;
            line-height: 1.5;
            color: #aaa;
            white-space: pre-wrap;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        .active-sub {
            color: #fff;
            background: rgba(248, 192, 5, 0.15);
            border-left: 2px solid var(--primary);
            padding-left: 5px;
            margin-left: -7px;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <header>
        <div>
            <h1>Previsualizador de Subtítulos</h1>
            <p id="video-title" style="opacity: 0.6; margin-top: 0.2rem; font-size: 1rem;">Cargando vídeo...</p>
        </div>
        <a href="/" class="btn-back">Volver al Dashboard</a>
    </header>

    <div class="layout">

        <!-- MITAD IZQUIERDA: VÍDEO Y SUBS EN DIRECTO -->
        <div class="left-col">
            <div class="video-wrapper">
                <div id="player"></div>
            </div>
            <div class="live-subs-box">
                <div style="width: 100%; display: flex; flex-direction: column; gap: 1rem;">
                    <div
                        style="background: rgba(59, 130, 246, 0.1); border: 1px solid #3b82f6; border-radius: 8px; padding: 15px 10px 10px 10px; position: relative;">
                        <span
                            style="position: absolute; top: -10px; left: 10px; background: var(--card-bg); font-size: 0.7rem; color: #3b82f6; padding: 0 5px; font-weight: bold;">YouTube
                            VTT</span>
                        <div id="live-vtt" class="live-text">-</div>
                    </div>
                    <div
                        style="background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; padding: 15px 10px 10px 10px; position: relative;">
                        <span
                            style="position: absolute; top: -10px; left: 10px; background: var(--card-bg); font-size: 0.7rem; color: #aaa; padding: 0 5px; font-weight: bold;">Whisper
                            SRT</span>
                        <div id="live-whisper" class="live-text">-</div>
                    </div>
                    <div
                        style="background: rgba(248, 192, 5, 0.1); border: 1px solid var(--primary); border-radius: 8px; padding: 15px 10px 10px 10px; position: relative;">
                        <span
                            style="position: absolute; top: -10px; left: 10px; background: var(--card-bg); font-size: 0.7rem; color: var(--primary); padding: 0 5px; font-weight: bold;">Gemini
                            (Refinado)</span>
                        <div id="live-gemini" class="live-text">Esperando reproducción...</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- COLUMNA 1 DERECHA: VTT -->
        <div class="text-panel">
            <div class="panel-header">
                <span>YouTube (VTT)</span>
                <span class="badge badge-vtt" id="vtt-badge">Cargando...</span>
            </div>
            <div class="text-content" id="vtt-content">Cargando VTT...</div>
        </div>

        <!-- COLUMNA 2 DERECHA: WHISPER -->
        <div class="text-panel">
            <div class="panel-header">
                <span>Whisper (Original)</span>
                <span class="badge badge-srt" id="whisper-badge">Cargando...</span>
            </div>
            <div class="text-content" id="whisper-content">Cargando SRT...</div>
        </div>

        <!-- COLUMNA 3 DERECHA: GEMINI -->
        <div class="text-panel">
            <div class="panel-header">
                <span>Gemini (Refinado)</span>
                <span class="badge badge-gemini" id="gemini-badge">Cargando...</span>
            </div>
            <div class="text-content" id="gemini-content">Cargando SRT...</div>
        </div>

    </div>

    <script>
        // Utilidad
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        const youtubeId = getQueryParam('v');
        let player;
        let srtData = []; // Whisper
        let vttData = []; // YouTube
        let geminiData = []; // Refinado
        let syncInterval;

        // Iniciar Iframe API
        function onYouTubeIframeAPIReady() {
            if (!youtubeId) return;
            player = new YT.Player('player', {
                videoId: youtubeId,
                playerVars: { 'autoplay': 0, 'controls': 1, 'rel': 0 },
                events: {
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                syncInterval = setInterval(updateLiveSubtitles, 100);
            } else {
                clearInterval(syncInterval);
            }
        }

        // Convertir tiempo SRT/VTT a Segundos
        function timeToSeconds(timeStr) {
            // "00:00:05,000" o "00:00:05.000"
            const parts = timeStr.replace(',', '.').split(':');
            if (parts.length === 3) {
                return (parseFloat(parts[0]) * 3600) + (parseFloat(parts[1]) * 60) + parseFloat(parts[2]);
            }
            return 0;
        }

        // Parsear SRT simple
        function parseSRT(text) {
            // Normalizar a \n
            const normalized = text.replace(/\r\n/g, '\n');
            const blocks = normalized.trim().split(/\n\s*\n/);
            const parsed = [];
            blocks.forEach(block => {
                const lines = block.split('\n');
                if (lines.length >= 3) {
                    // La primera linea es el numero, la segunda el tiempo
                    let timeLineIndex = 1;
                    if (!lines[timeLineIndex].includes('-->') && lines.length >= 4) timeLineIndex = 2; // por si acaso hay lineas vacias

                    const timeLine = lines[timeLineIndex];
                    if (timeLine && timeLine.includes('-->')) {
                        const times = timeLine.split('-->');
                        if (times.length === 2) {
                            const start = timeToSeconds(times[0]);
                            const end = timeToSeconds(times[1]);
                            const subText = lines.slice(timeLineIndex + 1).join('\n');
                            parsed.push({ start, end, text: subText });
                        }
                    }
                }
            });
            return parsed;
        }

        // Actualizar el texto debajo del vídeo
        function updateLiveSubtitles() {
            if (!player || !player.getCurrentTime) return;
            const currentTime = player.getCurrentTime();

            // Sincronizar Whisper
            let whisperText = "-";
            for (let i = 0; i < srtData.length; i++) {
                if (currentTime >= srtData[i].start && currentTime <= srtData[i].end) {
                    whisperText = srtData[i].text;
                    break;
                }
            }
            document.getElementById('live-whisper').innerText = whisperText;

            // Sincronizar Gemini
            let geminiText = "-";
            for (let i = 0; i < geminiData.length; i++) {
                if (currentTime >= geminiData[i].start && currentTime <= geminiData[i].end) {
                    geminiText = geminiData[i].text;
                    break;
                }
            }
            document.getElementById('live-gemini').innerText = geminiText;

            // Sincronizar VTT (YouTube)
            let vttText = "-";
            for (let i = 0; i < vttData.length; i++) {
                if (currentTime >= vttData[i].start && currentTime <= vttData[i].end) {
                    vttText = vttData[i].text;
                    break;
                }
            }
            document.getElementById('live-vtt').innerText = vttText;
        }

        // Cargar Datos
        if (youtubeId) {
            // Info
            fetch(`/api/videos/${youtubeId}`)
                .then(r => r.json())
                .then(d => document.getElementById('video-title').innerText = d.title || youtubeId)
                .catch(() => document.getElementById('video-title').innerText = youtubeId);

            // Cargar todos los subtítulos desde el nuevo endpoint
            fetch(`/api/subtitles/all/${youtubeId}`)
                .then(r => {
                    if (!r.ok) throw new Error(`HTTP error! status: ${r.status}`);
                    return r.json();
                })
                .then(d => {
                    // VTT
                    const vttContent = document.getElementById('vtt-content');
                    const vttBadge = document.getElementById('vtt-badge');
                    if (d.vtt) {
                        vttContent.innerText = d.vtt;
                        vttBadge.innerText = 'Listo';
                        vttData = parseSRT(d.vtt);
                    } else {
                        vttContent.innerText = "No disponible";
                        vttBadge.innerText = 'N/A';
                    }

                    // Whisper
                    const whisperContent = document.getElementById('whisper-content');
                    const whisperBadge = document.getElementById('whisper-badge');
                    if (d.whisper_srt) {
                        whisperContent.innerText = d.whisper_srt;
                        whisperBadge.innerText = 'Hostinger DB';
                        srtData = parseSRT(d.whisper_srt);
                    } else {
                        whisperContent.innerText = "No disponible";
                        whisperBadge.innerText = 'N/A';
                    }

                    // Gemini
                    const geminiContent = document.getElementById('gemini-content');
                    const geminiBadge = document.getElementById('gemini-badge');
                    if (d.temp_refinado_srt) {
                        geminiContent.innerText = d.temp_refinado_srt;
                        geminiBadge.innerText = 'Gemini 2.0';
                        geminiData = parseSRT(d.temp_refinado_srt);
                    } else {
                        geminiContent.innerText = "Pendiente de refinado";
                        geminiBadge.innerText = 'N/A';
                    }
                })
                .catch(err => {
                    console.error("Error cargando subs:", err);
                    showToast("Error al cargar subtítulos de la DB: " + err.message);
                });
        } else {
            document.getElementById('live-text').innerText = "Falta parámetro ?v=ID";
        }

        function showToast(msg) {
            // Reutilizar o crear mini toast
            console.log("Toast:", msg);
        }
    </script>
</body>

</html>
