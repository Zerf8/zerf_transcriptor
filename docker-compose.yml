version: '3.8'

services:
  api:
    build: .
    image: zerf_transcriptor_api:latest
    container_name: zerf_transcriptor-api-new
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DB_USER=${DB_USER:-zerf}
      - DB_PASS=${DB_PASS:-zerf_password}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-zerf_transcriptor}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD:-root_password}
      - MYSQL_DATABASE=${DB_NAME:-zerf_transcriptor}
      - MYSQL_USER=${DB_USER:-zerf}
      - MYSQL_PASSWORD=${DB_PASS:-zerf_password}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
